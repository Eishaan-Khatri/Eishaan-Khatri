<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" fill="none" role="img" aria-label="Eishaan Khatri — ML researcher and systems builder">
  <defs>
    <linearGradient id="sweep" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#ec4899"/>
      <stop offset="1" stop-color="#06b6d4"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1200 0" to="1200 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0" stop-color="#f5e9ff"/>
      <stop offset="0.45" stop-color="#a855f7"/>
      <stop offset="0.75" stop-color="#ec4899"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <radialGradient id="glowP" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ground -->
  <rect width="1200" height="300" fill="#050810"/>
  <rect width="1200" height="300" fill="#0a0f1c" opacity="0.5"/>
  <ellipse cx="1010" cy="30" rx="460" ry="320" fill="url(#glowP)"/>
  <ellipse cx="120" cy="300" rx="380" ry="280" fill="url(#glowC)"/>

  <!-- top + bottom sweep rules -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#sweep)"/>
  <rect x="0" y="297" width="1200" height="3" fill="url(#sweep)" opacity="0.6"/>

  <!-- drifting stars -->
  <g fill="#dfe6ff">
    <circle cx="150" cy="66" r="1.7"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="330" cy="44" r="1.2"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4.2s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="240" r="1.4"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="3.6s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="58" r="1.3" fill="#ffd37a"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="250" r="1.1"><animate attributeName="opacity" values="0.15;0.9;0.15" dur="4.6s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="46" r="1.5"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.3s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="256" r="1.2" fill="#f0abfc"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.9s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="238" r="1.3"><animate attributeName="opacity" values="0.15;0.85;0.15" dur="4.1s" begin="1.7s" repeatCount="indefinite"/></circle>
  </g>

  <!-- orbit system, right -->
  <g transform="translate(1035 150)">
    <circle r="82" fill="none" stroke="#7c3aed" stroke-opacity="0.22" stroke-dasharray="3 8"/>
    <circle r="48" fill="none" stroke="#06b6d4" stroke-opacity="0.28" stroke-dasharray="2 7"/>
    <g>
      <circle cx="82" cy="0" r="4.5" fill="#ec4899"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="16s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="48" cy="0" r="3.5" fill="#67e8f9"/>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="10s" repeatCount="indefinite"/>
    </g>
    <circle r="7" fill="#a855f7"/>
    <circle r="7" fill="none" stroke="#a855f7" stroke-width="1">
      <animate attributeName="r" values="7;16;7" dur="3.4s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.7;0;0.7" dur="3.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- wordmark -->
  <text x="92" y="150" font-family="'Trebuchet MS','Segoe UI',system-ui,sans-serif" font-size="74" font-weight="700" letter-spacing="0.5" fill="url(#nameGrad)">Eishaan Khatri</text>
  <text x="96" y="193" font-family="'Consolas','JetBrains Mono',ui-monospace,monospace" font-size="18.5" letter-spacing="3.5" fill="#9aa4b2">ML RESEARCHER  ·  SYSTEMS BUILDER  ·  3&#215; PUBLISHED</text>

  <!-- animated underline -->
  <rect x="96" y="212" width="60" height="2.5" rx="1" fill="url(#sweep)">
    <animate attributeName="width" values="60;540;60" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- focus chips -->
  <g font-family="'Consolas','JetBrains Mono',ui-monospace,monospace" font-size="13" fill="#c7cdd8">
    <g transform="translate(96 244)">
      <rect x="0" y="0" width="150" height="26" rx="13" fill="#ffffff" fill-opacity="0.04" stroke="#7c3aed" stroke-opacity="0.4"/>
      <text x="16" y="17">multilingual NLP</text>
    </g>
    <g transform="translate(258 244)">
      <rect x="0" y="0" width="176" height="26" rx="13" fill="#ffffff" fill-opacity="0.04" stroke="#ec4899" stroke-opacity="0.4"/>
      <text x="16" y="17">robustness &#38; safety</text>
    </g>
    <g transform="translate(446 244)">
      <rect x="0" y="0" width="196" height="26" rx="13" fill="#ffffff" fill-opacity="0.04" stroke="#06b6d4" stroke-opacity="0.4"/>
      <text x="16" y="17">edge &#38; multi-agent AI</text>
    </g>
  </g>
</svg>
